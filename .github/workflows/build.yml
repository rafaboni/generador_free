name: Build and Push to Docker Hub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The CUDA devel base image + PyTorch + SageAttention build artifacts
      # comfortably blow past the ~14GB free on a stock ubuntu-latest runner.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: rafaboni/generador_free:latest
          build-args: |
            CACHE_DATE=${{ github.run_id }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Print image reference
        run: |
          echo "Pushed: rafaboni/generador_free:latest"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Pin this in RunPod as: rafaboni/generador_free@${{ steps.build.outputs.digest }}"
